<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Gallery</title>
<link rel="stylesheet" href="gall.css">
</head>

<body>

<header>
    <h1>✨ Premium Gallery</h1>
    <button id="modeToggle">🌙</button>
</header>

<!-- Category Buttons -->
<div class="filters">
    <button onclick="filterImages(event,'all')" class="active">All</button>
    <button onclick="filterImages(event,'nature')">🌿</button>
    <button onclick="filterImages(event,'flowers')">🌸</button>
    <button onclick="filterImages(event,'books')">📚</button>
    <button onclick="filterImages(event,'airplane')">✈️</button>
</div>

<!-- Gallery -->
<div class="gallery">

    <!-- Nature -->
    <div class="card nature">
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
    </div>
    <div class="card nature">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    </div>

    <!-- Flowers -->
    <div class="card flowers">
        <img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946">
    </div>
    <div class="card flowers">
        <img src="https://images.unsplash.com/photo-1468327768560-75b778cbb551">
    </div>

    <!-- Books -->
    <div class="card books">
        <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794">
    </div>
    <div class="card books">
        <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66">
    </div>

    <!-- Airplane -->
    <div class="card airplane">
       
        <img src="https://images.unsplash.com/photo-1436491865332-7a61a109cc05">
    </div>

    </div>

</div>

</html>
